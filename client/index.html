<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader — YouTube 영상 다운로드</title>
    <meta name="description" content="YouTube 영상을 1K, 2K, 4K 화질로 다운로드하세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.35);
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.25);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --bg-deep: #050a18;
            --bg-card: rgba(15, 23, 42, 0.65);
            --bg-card-hover: rgba(20, 30, 55, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            top: -200px; left: -100px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            animation: float1 15s ease-in-out infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            bottom: -150px; right: -100px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
            animation: float2 18s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.1); }
            66% { transform: translate(-40px, 120px) scale(0.9); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, -80px) scale(1.15); }
            66% { transform: translate(50px, -40px) scale(0.95); }
        }

        /* Grid pattern overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .header .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .header .logo-icon {
            width: 52px; height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 32px var(--primary-glow);
        }
        .header h1 {
            font-size: 2.75rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 30%, #7c3aed 60%, #06b6d4 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 0.75rem;
            font-weight: 300;
        }

        /* Glass Card */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 
                0 25px 50px -12px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
            transition: border-color 0.3s;
        }
        .card:hover {
            border-color: var(--glass-border-hover);
        }

        /* Input Section */
        .input-section {
            position: relative;
        }
        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
        }
        .url-input {
            flex: 1;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 400;
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid var(--glass-border);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .url-input::placeholder { color: var(--text-muted); }
        .url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-fetch {
            padding: 0 1.75rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            white-space: nowrap;
            min-width: 100px;
        }
        .btn-fetch:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }
        .btn-fetch:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-fetch:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .error-toast {
            margin-top: 1rem;
            padding: 0.85rem 1.25rem;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shakeIn 0.4s ease-out;
        }

        /* Video Info */
        .video-section {
            margin-top: 2rem;
            animation: fadeIn 0.5s ease-out;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border-hover), transparent);
            margin: 1.5rem 0;
        }

        .video-card {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .thumb-wrap {
            flex-shrink: 0;
            width: 200px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            position: relative;
        }
        .thumb-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
        .duration-badge {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .video-meta {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .video-meta h2 {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta .channel {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* Quality Buttons */
        .quality-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.75rem;
        }

        .quality-btn {
            position: relative;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid var(--glass-border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: inherit;
            color: var(--text-primary);
        }
        .quality-btn:hover:not(:disabled):not(.downloading) {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.12);
        }
        .quality-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .quality-btn.downloading {
            border-color: var(--accent);
            cursor: default;
        }
        .quality-btn.complete {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.08);
        }
        .quality-btn.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.08);
        }

        .quality-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .tag-4k { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .tag-2k { background: linear-gradient(135deg, var(--primary), #6d28d9); color: #fff; }
        .tag-1k { background: linear-gradient(135deg, var(--accent), #0891b2); color: #fff; }
        .tag-hd { background: rgba(100, 116, 139, 0.3); color: var(--text-secondary); }
        .tag-sd { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }
        .tag-best { background: linear-gradient(135deg, var(--success), #059669); color: #fff; }

        .quality-label {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .quality-size {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Download icon */
        .dl-icon {
            position: absolute;
            top: 1rem; right: 1rem;
            font-size: 1.1rem;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .quality-btn:hover:not(:disabled):not(.downloading) .dl-icon {
            opacity: 0.8;
        }

        /* Progress bar inside button */
        .progress-track {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 0 0 14px 14px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 0 0 14px 14px;
        }

        .status-text {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .status-text.downloading-text { color: var(--accent); }
        .status-text.complete-text { color: var(--success); }
        .status-text.error-text { color: var(--danger); }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        .footer span {
            color: var(--text-secondary);
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes shakeIn {
            0% { opacity: 0; transform: translateX(-8px); }
            50% { transform: translateX(4px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 2rem 1rem; }
            .header h1 { font-size: 2rem; }
            .input-wrapper { flex-direction: column; }
            .btn-fetch { padding: 0.85rem; }
            .video-card { flex-direction: column; }
            .thumb-wrap { width: 100%; }
            .quality-grid { grid-template-columns: 1fr; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">▶</div>
            </div>
            <h1>Video Downloader</h1>
            <p>YouTube 영상을 1K · 2K · 4K 화질로 다운로드</p>
        </header>

        <main class="card" id="mainCard">
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="url" 
                        id="urlInput" 
                        class="url-input" 
                        placeholder="YouTube 링크를 붙여넣으세요..."
                        autocomplete="off"
                    >
                    <button id="fetchBtn" class="btn-fetch" onclick="fetchVideoInfo()">
                        검색
                    </button>
                </div>
                <div id="errorContainer"></div>
            </div>

            <div id="videoSection" style="display: none;"></div>
        </main>

        <footer class="footer">
            <span>다운로드 경로:</span> ~/Downloads &nbsp;·&nbsp; Powered by yt-dlp
        </footer>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:3001';  // Points to local background service
        let currentVideoInfo = null;

        // Auto-paste detection
        document.getElementById('urlInput').addEventListener('paste', () => {
            setTimeout(() => fetchVideoInfo(), 200);
        });

        // Enter key support
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') fetchVideoInfo();
        });

        async function fetchVideoInfo() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            if (!url) return;

            const fetchBtn = document.getElementById('fetchBtn');
            const errorContainer = document.getElementById('errorContainer');
            const videoSection = document.getElementById('videoSection');

            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<span class="spinner"></span>';
            errorContainer.innerHTML = '';
            videoSection.style.display = 'none';

            try {
                const resp = await fetch(`${API_BASE}/api/info?url=${encodeURIComponent(url)}`);
                if (!resp.ok) {
                    const data = await resp.json();
                    throw new Error(data.error || '영상 정보를 불러올 수 없습니다.');
                }

                const data = await resp.json();
                currentVideoInfo = data;
                renderVideoInfo(data);
                videoSection.style.display = 'block';

            } catch (err) {
                errorContainer.innerHTML = `
                    <div class="error-toast">
                        ⚠️ ${err.message}
                    </div>
                `;
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = '검색';
            }
        }

        function formatFileSize(bytes) {
            if (!bytes) return '크기 미정';
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1024).toFixed(0) + ' KB';
        }

        function getTagClass(qualityTag) {
            switch(qualityTag) {
                case '4K': return 'tag-4k';
                case '2K': return 'tag-2k';
                case '1K': return 'tag-1k';
                case 'HD': return 'tag-hd';
                case 'BEST': return 'tag-best';
                default: return 'tag-sd';
            }
        }

        function renderVideoInfo(info) {
            const section = document.getElementById('videoSection');

            let qualityCards = info.formats.map((fmt, i) => `
                <button class="quality-btn" id="dlBtn_${i}" onclick="startDownload(${i})">
                    <span class="dl-icon">⬇</span>
                    <span class="quality-tag ${getTagClass(fmt.qualityTag)}">${fmt.qualityTag}</span>
                    <div class="quality-label">${fmt.resolution}</div>
                    <div class="quality-size">${formatFileSize(fmt.filesize)}</div>
                    <div class="progress-track"><div class="progress-bar" id="progress_${i}"></div></div>
                    <div class="status-text" id="status_${i}"></div>
                </button>
            `).join('');

            section.innerHTML = `
                <div class="divider"></div>
                <div class="video-card">
                    <div class="thumb-wrap">
                        <img src="${info.thumbnail}" alt="${info.title}" referrerpolicy="no-referrer">
                        <span class="duration-badge">${info.duration || ''}</span>
                    </div>
                    <div class="video-meta">
                        <h2>${info.title}</h2>
                        <div class="channel">📺 ${info.channel}</div>
                    </div>
                </div>
                <div class="quality-section">
                    <h3>화질을 선택하세요</h3>
                    <div class="quality-grid">
                        ${qualityCards}
                    </div>
                </div>
            `;
        }

        async function startDownload(index) {
            const fmt = currentVideoInfo.formats[index];
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById(`dlBtn_${index}`);
            const progressBar = document.getElementById(`progress_${index}`);
            const statusEl = document.getElementById(`status_${index}`);

            if (btn.classList.contains('downloading') || btn.classList.contains('complete')) return;

            btn.classList.add('downloading');
            btn.disabled = true;
            statusEl.className = 'status-text downloading-text';
            statusEl.textContent = '다운로드 준비 중...';

            try {
                // Start the download
                const resp = await fetch(`${API_BASE}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: fmt.format_id })
                });

                if (!resp.ok) {
                    const data = await resp.json();
                    throw new Error(data.error || '다운로드 시작 실패');
                }

                const { downloadId, filename } = await resp.json();

                // Listen to SSE for progress
                const evtSource = new EventSource(`${API_BASE}/api/progress/${downloadId}`);

                evtSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.status === 'downloading') {
                        const pct = Math.round(data.progress);
                        progressBar.style.width = pct + '%';
                        statusEl.textContent = `다운로드 중... ${pct}%`;
                    } else if (data.status === 'complete') {
                        progressBar.style.width = '100%';
                        statusEl.className = 'status-text complete-text';
                        statusEl.textContent = `✓ 완료! — ${data.filename}`;
                        btn.classList.remove('downloading');
                        btn.classList.add('complete');
                        btn.querySelector('.dl-icon').textContent = '✓';
                        evtSource.close();
                    } else if (data.status === 'error') {
                        statusEl.className = 'status-text error-text';
                        statusEl.textContent = `✗ 오류: ${data.error}`;
                        btn.classList.remove('downloading');
                        btn.classList.add('error');
                        btn.disabled = false;
                        evtSource.close();
                    } else if (data.status === 'unknown') {
                        evtSource.close();
                    }
                };

                evtSource.onerror = () => {
                    evtSource.close();
                    statusEl.className = 'status-text error-text';
                    statusEl.textContent = '연결 오류';
                    btn.classList.remove('downloading');
                    btn.disabled = false;
                };

            } catch (err) {
                statusEl.className = 'status-text error-text';
                statusEl.textContent = `오류: ${err.message}`;
                btn.classList.remove('downloading');
                btn.classList.add('error');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
